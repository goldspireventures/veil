<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unlock [redacted]</title>
    <link rel="stylesheet" href="unlock.css" />
  </head>
  <body>
    <main class="unlock">
      <header class="unlock__header">
        <div class="unlock__logo" aria-hidden="true">🔒</div>
        <div>
          <h1>Unlock [redacted]</h1>
          <p id="subtitle">Enter the passphrase shared with you.</p>
        </div>
      </header>

      <form id="unlock-form" class="unlock__form">
        <label id="paste-field" class="field">
          <span>Paste message containing [redacted]</span>
          <textarea id="securedText" rows="4" placeholder="Paste the full message here"></textarea>
        </label>
        <label class="field">
          <span id="secret-label">Passphrase</span>
          <input id="secret" type="password" autocomplete="off" required />
        </label>
        <button type="submit" class="btn">Unlock</button>
      </form>

      <section id="result" class="result" hidden>
        <h2>Unlocked</h2>
        <code id="result-value"></code>
        <div class="result__actions">
          <button type="button" id="copy-result" class="btn btn--ghost">Copy</button>
        </div>
      </section>

      <p id="error" class="error" hidden></p>

      <p id="link-hint" class="hint" hidden>
        Opened from email? This page is normal when using the Outlook desktop app.
        For an in-page popup, read the message in Gmail or Outlook <strong>in your browser</strong> with the extension installed.
      </p>
    </main>
    <script src="constants.js"></script>
    <script src="constants.js"></script>
    <script src="browser.js"></script>
    <script src="crypto.js"></script>
    <script src="marker.js"></script>
    <script src="redacted.js"></script>
    <script src="unlock.js"></script>
  </body>
</html>
