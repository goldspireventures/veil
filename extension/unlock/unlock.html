<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'self';"
    />
    <title>Unlock — Veil by Goldspire</title>
    <link rel="icon" href="icons/icon-48.png" sizes="48x48" />
    <link rel="stylesheet" href="unlock.css" />
  </head>
  <body>
    <main class="unlock">
      <header class="unlock__header">
        <img class="unlock__logo" src="icons/icon-48.png" alt="" width="40" height="40" />
        <div>
          <h1>Unlock [redacted]</h1>
          <p id="subtitle">Enter the passphrase shared with you.</p>
        </div>
      </header>

      <form id="unlock-form" class="unlock__form" method="post" action="#">
        <label id="paste-field" class="field">
          <span>Paste message containing [redacted]</span>
          <textarea id="securedText" rows="4" placeholder="Paste the full message here"></textarea>
        </label>
        <label class="field">
          <span id="secret-label">Passphrase</span>
          <input id="secret" name="passphrase" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn">Unlock</button>
      </form>

      <section id="result" class="result" hidden>
        <h2>Unlocked</h2>
        <code id="result-value"></code>
        <div class="result__actions">
          <button type="button" id="copy-result" class="btn btn--ghost">Copy</button>
        </div>
      </section>

      <p id="error" class="error" hidden></p>
    </main>
    <script src="../src/constants.js"></script>
    <script src="../src/passphrase-policy.js"></script>
    <script src="../src/burn-list.js"></script>
    <script src="../src/browser.js"></script>
    <script src="../src/crypto.js"></script>
    <script src="../src/marker.js"></script>
    <script src="../src/redacted.js"></script>
    <script src="unlock.js"></script>
  </body>
</html>
