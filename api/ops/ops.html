<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Veil platform ops</title>
  <link rel="stylesheet" href="/portal/common.css" />
  <link rel="icon" href="/portal/favicon.png" sizes="48x48" />
  <style>
    .ops-header { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .ops-header h1 { margin: 0; }
    .ops-badge { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(212,175,55,0.15); color: var(--gold, #d4af37); }
    .ops-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin: 1rem 0; }
    .ops-stat { padding: 0.75rem 1rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; }
    .ops-stat strong { display: block; font-size: 1.35rem; }
    .ops-stat span { color: var(--muted, #9aa3b2); font-size: 0.8rem; }
    .ops-stat--ok strong { color: #6dd58c; }
    .ops-stat--warn strong { color: #f0b429; }
    .ops-stat--bad strong { color: #f07178; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th, .data-table td { text-align: left; padding: 0.45rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: top; }
    .data-table th { color: var(--muted, #9aa3b2); font-weight: 600; }
    .hint-inline { color: var(--muted, #9aa3b2); font-size: 0.85rem; }
    .section-gap { margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="layout">
    <header class="ops-header card card--flat">
      <div>
        <p class="eyebrow">Internal · API host only</p>
        <h1>Veil platform ops</h1>
      </div>
      <span class="ops-badge">noindex · metadata only</span>
    </header>

    <div class="card">
      <form id="ops-form" class="form-stack">
        <label class="field">
          <span>Ops token</span>
          <input type="password" id="ops-token" autocomplete="off" placeholder="PLATFORM_OPS_TOKEN" />
        </label>
        <div class="btn-row">
          <label class="field" style="flex:1;min-width:8rem">
            <span>Window (days)</span>
            <input type="number" id="ops-days" min="1" max="30" value="7" />
          </label>
          <button type="submit" class="btn">Load summary</button>
          <button type="button" class="btn btn--ghost" id="ops-refresh">Refresh</button>
        </div>
        <p class="hint" id="ops-status"></p>
      </form>
      <div id="ops-summary"></div>
    </div>
  </div>
  <script src="/portal/ops.js"></script>
  <script>GoldspireOpsDashboard.init();</script>
</body>
</html>
