<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join a team — Veil by Goldspire</title>
  <link rel="stylesheet" href="portal/common.css" />
</head>
<body>
  <div class="layout">
    <nav class="nav" data-portal-nav></nav>

    <div class="card">
      <h1>Join your team</h1>
      <p class="lede">Enter the join code from your admin and your work email. You’ll need the Veil extension installed.</p>

      <form id="join-form">
        <div class="field" id="api-base-row" hidden>
          <label for="api-base">Server</label>
          <input id="api-base" name="apiBase" autocomplete="off" />
        </div>

        <div class="field">
          <label for="join-code">Join code</label>
          <input id="join-code" class="code" name="joinCode" autocomplete="off" required placeholder="XXXX-XXXX" />
        </div>

        <div class="field">
          <label for="join-email">Work email</label>
          <input id="join-email" type="email" name="email" autocomplete="email" required placeholder="you@company.com" />
        </div>

        <button type="submit" class="btn" id="submit-btn">Connect extension</button>
      </form>

      <div id="status" class="status" role="status"></div>
    </div>

    <footer class="site-footer" data-portal-footer></footer>
  </div>

  <script src="portal/config.js"></script>
  <script src="portal/app.js"></script>
  <script src="portal/nav.js"></script>
  <script>
    GoldspirePortalNav.renderPortalNav('join');
    GoldspirePortalNav.renderPortalFooter?.();

    const app = GoldspirePortalApp;
    const params = new URLSearchParams(location.search);
    const deviceId = params.get('device_id') || '';
    const extensionId = params.get('extension_id') || '';
    const statusEl = document.getElementById('status');
    const form = document.getElementById('join-form');
    const submitBtn = document.getElementById('submit-btn');
    const apiBaseInput = document.getElementById('api-base');
    const apiBaseRow = document.getElementById('api-base-row');

    const apiFromQuery = params.get('api') || params.get('api_base') || '';
    apiBaseInput.value = apiFromQuery || app.apiBase();
    if (!apiBaseInput.value) apiBaseRow.hidden = false;

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const joinCode = document.getElementById('join-code').value.trim();
      const email = document.getElementById('join-email').value.trim().toLowerCase();
      const manualBase = apiBaseInput.value.trim().replace(/\/+$/, '');
      let apiBase = manualBase;
      if (apiBase) {
        try { apiBase = new URL(apiBase).toString().replace(/\/+$/, ''); } catch { apiBase = ''; }
      }
      if (!apiBase) apiBase = app.apiBase();
      if (!apiBase) {
        app.setStatus(statusEl, 'Server address is not configured.', 'error');
        apiBaseRow.hidden = false;
        return;
      }
      if (!joinCode || !email) return;

      submitBtn.disabled = true;
      app.setStatus(statusEl, 'Connecting…');

      const effectiveDeviceId = deviceId || crypto.randomUUID();
      try {
        const response = await fetch(`${apiBase}/v1/extension/org/join`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Device-Id': effectiveDeviceId,
          },
          body: JSON.stringify({ joinCode, deviceId: effectiveDeviceId, email }),
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.message || payload.error || 'Could not join this team.');
        }

        const runtime = typeof chrome !== 'undefined' ? chrome : (typeof browser !== 'undefined' ? browser : null);
        if (extensionId && runtime?.runtime?.sendMessage) {
          await runtime.runtime.sendMessage(extensionId, {
            type: 'ORG_PROVISION',
            payload,
          });
          app.setStatus(statusEl, 'Connected. Return to the extension to finish setup.', 'ok');
        } else {
          app.setStatus(statusEl, `Connected to ${payload.orgDisplayName || 'your team'}. Open the extension, choose Team, and enter the same join code and email.`, 'ok');
        }
      } catch (err) {
        app.setStatus(statusEl, err.message || 'Could not join this team.', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    if (extensionId && deviceId) {
      app.setStatus(statusEl, 'Enter your join code and work email, then connect.', 'warn');
    }
  </script>
</body>
</html>
